name: Configure Trip

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        type: string
      send_time_gst:
        description: "Send time in GST offset timezone (HH:MM 24h)"
        required: true
        type: string
      gst_utc_offset:
        description: "UTC offset like UTC-07:00"
        required: true
        type: string
      latitude:
        description: "Forecast lookup latitude"
        required: true
        type: string
      longitude:
        description: "Forecast lookup longitude"
        required: true
        type: string
      avcan_region_mode:
        description: "Avalanche region selector type"
        required: false
        type: choice
        options:
          - area_id
          - region_name
      avcan_region_value:
        description: "Area id or region name"
        required: false
        type: string
      opensnow_target_mode:
        description: "OpenSnow selector type"
        required: true
        type: choice
        options:
          - coordinates
          - point_id
      opensnow_lat:
        description: "Latitude (if coordinates mode)"
        required: false
        type: string
      opensnow_lon:
        description: "Longitude (if coordinates mode)"
        required: false
        type: string
      opensnow_point_id:
        description: "Point id (if point_id mode)"
        required: false
        type: string
      mapshare_url:
        description: "MapShare link to receive message"
        required: true
        type: string
      opensnow_auth_secret_name:
        description: "Optional secret name containing OpenSnow auth JSON"
        required: false
        type: string
      preview_only:
        description: "Keep send disabled until activate workflow"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Write trip config
        run: |
          python scripts/configure_trip.py \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --send-time-gst "${{ inputs.send_time_gst }}" \
            --gst-utc-offset "${{ inputs.gst_utc_offset }}" \
            --latitude "${{ inputs.latitude }}" \
            --longitude "${{ inputs.longitude }}" \
            --avcan-region-mode "${{ inputs.avcan_region_mode }}" \
            --avcan-region-value "${{ inputs.avcan_region_value }}" \
            --opensnow-target-mode "${{ inputs.opensnow_target_mode }}" \
            --opensnow-lat "${{ inputs.opensnow_lat }}" \
            --opensnow-lon "${{ inputs.opensnow_lon }}" \
            --opensnow-point-id "${{ inputs.opensnow_point_id }}" \
            --mapshare-url "${{ inputs.mapshare_url }}" \
            --opensnow-auth-secret-name "${{ inputs.opensnow_auth_secret_name }}" \
            --preview-only "${{ inputs.preview_only }}"

      - name: Commit trip state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .trip_state/current_trip.json
          if git diff --cached --quiet; then
            echo "No trip-state changes to commit"
            exit 0
          fi
          git commit -m "chore: configure trip state"
          git push

      - name: Summary
        run: |
          {
            echo "## Trip configured"
            echo "- Preview only: ${{ inputs.preview_only }}"
            echo "- Region: ${{ inputs.avcan_region_mode }} / ${{ inputs.avcan_region_value }}"
            echo "- OpenSnow target: ${{ inputs.opensnow_target_mode }}"
          } >> "$GITHUB_STEP_SUMMARY"
