name: Activate Sending

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Turn off preview_only
        run: |
          python scripts/activate_sending.py

      - name: Commit updated trip state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .trip_state/current_trip.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: activate scheduled sending"
          git push

      - name: Summary
        run: |
          {
            echo "## Sending activated"
            echo "- preview_only is now false"
          } >> "$GITHUB_STEP_SUMMARY"