name: Scheduled Send

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m playwright install --with-deps chromium

      - name: Run scheduled send
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -m inreach_bot.main --mode send --artifacts-dir artifacts

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-send-artifacts
          path: artifacts/
          if-no-files-found: warn

      - name: Commit idempotency state
        if: always()
        run: |
          if [ ! -f .trip_state/last_sent.json ]; then
            echo "No last_sent state to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .trip_state/last_sent.json
          if git diff --cached --quiet; then
            echo "No idempotency changes"
            exit 0
          fi
          git commit -m "chore: update last sent state"
          git push
